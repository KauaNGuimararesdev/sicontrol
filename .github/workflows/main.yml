# Build do APK na nuvem (sem instalar nada no seu PC).
#
# Como usar:
#   1. Crie um repositorio no GitHub e suba esta pasta inteira (inclua a pasta
#      oculta .github).
#   2. O build roda sozinho a cada push. Tambem da pra rodar manualmente em
#      Actions > "build-apk" > "Run workflow".
#   3. Quando terminar, abra a execucao em Actions, role ate "Artifacts" e
#      baixe "SiControl-apk". Dentro vem o .apk.
#   4. O APK vem assinado com a chave de debug: instala direto no celular
#      (ative "fontes desconhecidas"). Para a Play Store, assine com sua keystore.
#
# Se der erro vermelho, copie a mensagem do log do Actions que eu corrijo.
 
name: build-apk
 
on:
  push:
  workflow_dispatch:
 
env:
  QT_VERSION: 6.8.3
  ANDROID_ABI: arm64-v8a
 
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
 
      # Qt do host (ferramentas: androiddeployqt, moc, qmlimportscanner).
      - name: Qt host (desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
 
      # A action exporta QT_ROOT_DIR apontando pro Qt recem instalado.
      # Guardamos o do host antes de instalar o de Android (que sobrescreve).
      - name: Guardar caminho do Qt host
        run: echo "QT_HOST=$QT_ROOT_DIR" >> "$GITHUB_ENV"
 
      # Qt para Android (arm64) - cobre praticamente todo celular atual.
      - name: Qt android (arm64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
 
      - name: Guardar caminho do Qt android
        run: echo "QT_ANDROID=$QT_ROOT_DIR" >> "$GITHUB_ENV"
 
      # NDK que combina com o Qt 6.8.
      - name: Android NDK r26b
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: false
 
      - name: Conferir caminhos (debug)
        run: |
          echo "QT_HOST=$QT_HOST"
          echo "QT_ANDROID=$QT_ANDROID"
          ls -la "$QT_ANDROID/bin" | head -40 || true
 
      - name: Configurar e compilar
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          "$QT_ANDROID/bin/qt-cmake" -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH="$QT_HOST" \
            -DANDROID_ABI="${{ env.ANDROID_ABI }}" \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT"
          cmake --build build --parallel
          # Gera o APK. O nome do alvo pode variar entre versoes do Qt;
          # tentamos os comuns sem falhar caso ja tenha sido gerado.
          cmake --build build --target apk || \
          cmake --build build --target SiControl_make_apk || true
 
      - name: Localizar APK
        run: |
          echo "APKs encontrados:"
          find build -name '*.apk' -print
 
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: SiControl-apk
          path: build/**/*.apk
          if-no-files-found: warn
