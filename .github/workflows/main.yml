# Build do APK na nuvem (sem instalar nada no seu PC).
#
# Como usar:
#   1. Suba esta pasta inteira pra um repo no GitHub (inclua a pasta .github).
#   2. Roda sozinho a cada push, ou em Actions > "build-apk" > "Run workflow".
#   3. APK pronto em Actions > a execucao > "Artifacts" > "SiControl-apk".
#   4. Vem assinado em debug: instala direto no celular.
#
# Se falhar, o passo "Diagnostico verbose" imprime o erro REAL do empacotamento.
# Copie esse trecho do log que eu corrijo.

name: build-apk

on:
  push:
  workflow_dispatch:

env:
  QT_VERSION: 6.8.3
  ANDROID_ABI: arm64-v8a

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Qt host (desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64

      - name: Guardar caminho do Qt host
        run: echo "QT_HOST=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      - name: Qt android (arm64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a

      - name: Guardar caminho do Qt android
        run: echo "QT_ANDROID=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      - name: Android NDK r26b
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: false

      - name: Configurar e compilar (nativo)
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> "$GITHUB_ENV"
          "$QT_ANDROID/bin/qt-cmake" -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH="$QT_HOST" \
            -DANDROID_ABI="${{ env.ANDROID_ABI }}" \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT"
          cmake --build build --parallel

      - name: Empacotar APK
        run: cmake --build build --target SiControl_make_apk

      # So roda se o passo acima falhar: reexecuta o empacotamento com --verbose
      # pra mostrar o erro real (geralmente do Gradle / Kotlin).
      - name: Diagnostico verbose (se falhar)
        if: failure()
        run: |
          echo "===== procurando deployment-settings.json ====="
          JSON=$(find build -name '*deployment-settings*.json' | head -1)
          echo "json: $JSON"
          DEPLOY="$QT_HOST/bin/androiddeployqt"
          [ -x "$DEPLOY" ] || DEPLOY="$QT_ANDROID/bin/androiddeployqt"
          echo "androiddeployqt: $DEPLOY"
          echo "===== androiddeployqt --verbose ====="
          "$DEPLOY" --input "$JSON" --output build/android-build \
            --android-platform android-34 --gradle --verbose 2>&1 | tail -250 || true
          echo "===== procurando logs do gradle ====="
          find build -name '*.txt' -path '*gradle*' -exec sh -c 'echo "--- $1 ---"; tail -80 "$1"' _ {} \; || true

      - name: Localizar APK
        run: |
          echo "APKs encontrados:"
          find build -name '*.apk' -print

      - name: Publicar APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SiControl-apk
          path: build/**/*.apk
          if-no-files-found: warn
